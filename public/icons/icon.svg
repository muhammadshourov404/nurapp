<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Mosque dome -->
  <ellipse cx="256" cy="180" rx="90" ry="70" fill="none" stroke="url(#gold)" stroke-width="12"/>

  <!-- Mosque main body -->
  <rect x="140" y="250" width="232" height="140" rx="8" fill="none" stroke="url(#gold)" stroke-width="12"/>

  <!-- Mosque door -->
  <path d="M228 390 L228 310 Q256 285 284 310 L284 390Z" fill="none" stroke="url(#gold)" stroke-width="10"/>

  <!-- Left minaret -->
  <rect x="110" y="210" width="28" height="180" rx="4" fill="none" stroke="url(#gold)" stroke-width="10"/>
  <ellipse cx="124" cy="210" rx="18" ry="28" fill="none" stroke="url(#gold)" stroke-width="10"/>
  <line x1="124" y1="182" x2="124" y2="160" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>

  <!-- Right minaret -->
  <rect x="374" y="210" width="28" height="180" rx="4" fill="none" stroke="url(#gold)" stroke-width="10"/>
  <ellipse cx="388" cy="210" rx="18" ry="28" fill="none" stroke="url(#gold)" stroke-width="10"/>
  <line x1="388" y1="182" x2="388" y2="160" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>

  <!-- Top crescent -->
  <path d="M256 115 C240 95 218 95 210 112 C225 105 245 108 256 125 C267 108 287 105 302 112 C294 95 272 95 256 115Z" fill="url(#gold)"/>

  <!-- Star -->
  <circle cx="256" cy="148" r="8" fill="url(#gold)"/>

  <!-- Windows -->
  <ellipse cx="190" cy="295" rx="20" ry="28" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <ellipse cx="322" cy="295" rx="20" ry="28" fill="none" stroke="url(#gold)" stroke-width="8"/>

  <!-- Ground line -->
  <line x1="80" y1="390" x2="432" y2="390" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
</svg>
